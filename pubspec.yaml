name: homes123
description: "123Homes – Find Your Dream Property"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  provider: ^6.1.2
  cached_network_image: ^3.4.1
  smooth_page_indicator: ^1.2.0+3
  flutter_staggered_animations: ^1.1.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  supabase_flutter: ^2.9.0
  image_picker: ^1.1.2
  file_picker: ^8.1.7
  path: ^1.9.0
  flutter_image_compress: ^2.4.0
  path_provider: ^2.1.6
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/123homes_logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
